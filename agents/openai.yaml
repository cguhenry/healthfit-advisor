name: healthfit-advisor
version: "0.1.0"
platform: openai
description: "OpenAI Assistants / Responses manifest for HealthFit Advisor."

interface:
  display_name: "HealthFit Advisor"
  short_description: "健康減重、增肌與熱量規劃技能"
  default_prompt: "Use HealthFit Advisor to intake profile data, plan calories/macros, log meals, generate reports, and provide GI-aware food guidance."

tools:
  - name: intake
    description: "建立或更新使用者健康檔案，計算每日熱量與巨量營養素目標。"
    entry: "python3 scripts/healthfit.py intake"
  - name: log_meal
    description: "記錄一餐的食物攝取。"
    entry: "python3 scripts/healthfit.py log meal"
  - name: log_from_image
    description: "將食物照片分析 JSON 直接解析並寫入熱量追蹤。"
    entry: "python3 scripts/healthfit.py log from-image"
  - name: image_prompt
    description: "為附圖的食物分析產出 prompt bundle、phase3_response.json 建議檔名與下一步落庫命令。"
    entry: "python3 scripts/healthfit.py image prompt"
  - name: checkin_prompt
    description: "產生每日 check-in 問句與建議的回覆落庫命令。"
    entry: "python3 scripts/healthfit.py checkin prompt"
  - name: checkin_answer
    description: "解析使用者自然語言的餐次回覆，並直接以手動紀錄方式寫入 food_logs。"
    entry: "python3 scripts/healthfit.py checkin answer"
  - name: notify_checkin
    description: "產生並送出固定時間的每日 meal check-in 提問，可配合 cron 使用。"
    entry: "python3 scripts/healthfit.py notify checkin"
  - name: daily_report
    description: "產生每日飲食摘要與評分報告。"
    entry: "python3 scripts/healthfit.py report daily"
  - name: weekly_report
    description: "產生每週飲食回顧與週評分。"
    entry: "python3 scripts/healthfit.py report weekly"
  - name: weight_chart
    description: "顯示體重預測曲線 vs 實際體重的 ASCII 折線圖，並給出超前/落後進度評估"
    entry: "python3 scripts/healthfit.py chart"
    input_schema:
      properties:
        weeks: { type: integer, default: 13 }
        from_date: { type: string, description: "ISO date" }
        to_date: { type: string, description: "ISO date" }
  - name: meal_plan
    description: "產生七天飲食計劃。"
    entry: "python3 scripts/healthfit.py plan"
  - name: check_gi
    description: "查詢食物 GI 與替換建議。"
    entry: "python3 scripts/healthfit.py gi classify"
  - name: menu_suggest
    description: "推薦外食菜單。"
    entry: "python3 scripts/healthfit.py menu"
  - name: dining_advise
    description: "外食推薦引擎，支援 --scene 指定店家類型、--menu-json 讀取實際菜單 JSON、--user-id 從 DB 自動帶入今日狀態。"
    entry: "python3 scripts/healthfit.py dining"
  - name: alert_check
    description: "執行健康警示檢查；遇到連續 2 週停滯時，會自動重算並寫入新的 active plan。"
    entry: "python3 scripts/healthfit.py alert check"
  - name: shopping_push
    description: "產生下週飲食計劃的採購清單，推播至 Discord/LINE，可選輸出 PDF"
    entry: "python3 scripts/shopping_push.py"
    input_schema:
      properties:
        week_start:
          type: string
          description: "ISO date of Monday, or 'next'"
        pdf:
          type: boolean
          default: false
        output:
          type: string
          description: "PDF output path"
